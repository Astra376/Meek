name = "character-chat-worker"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["enable_request_signal"]

[vars]
GOOGLE_WEB_CLIENT_ID = "1081775489416-vdlfr5tjuea8l826mqog05ijfp3ltk76.apps.googleusercontent.com"
OPENROUTER_MODEL = "deepseek/deepseek-v4-flash"
OPENROUTER_FALLBACK_MODELS = "deepseek/deepseek-v3.2"
FAL_MODEL = "fal-ai/nano-banana-2"
R2_PUBLIC_BASE_URL = "https://character-chat-worker.robloxproxy.workers.dev/v1/assets"

[[d1_databases]]
binding = "DB"
database_name = "character-chat"
database_id = "ad611737-fc84-4002-bcfe-0f0ce257f2ae"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "character-chat-assets"

[triggers]
crons = ["*/15 * * * *"]
